<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioPulse Nexus - Administrative Console</title>
    <style>
        body { background-color: #f4f6f9; font-family: system-ui, sans-serif; margin: 0; padding: 10px; }
        .blogger-settings-container { max-width: 100%; background: white; padding: 20px; border-radius: 12px; }
        h2 { color: #2c3e50; font-size: 16pt; margin-bottom: 5px; }
        .settings-section-title { font-size: 12pt; color: #16a085; margin-top: 25px; margin-bottom: 10px; border-bottom: 1px solid #edf2f7; padding-bottom: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;}
        .blogger-setting-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 15px 0; border-bottom: 1px solid #f7fafc; }
        .setting-metadata { display: flex; flex-direction: column; padding-right: 15px; }
        .setting-label-text { font-weight: 600; color: #2d3748; font-size: 11pt; }
        .setting-sub-description { color: #718096; font-size: 9.5pt; margin-top: 3px; line-height: 1.4; }
        
        .switch-toggle-container { position: relative; display: inline-block; width: 44px; height: 22px; flex-shrink: 0; margin-top: 4px; }
        .switch-toggle-container input { opacity: 0; width: 0; height: 0; }
        .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .25s; border-radius: 22px; }
        .slider-round:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .25s; border-radius: 50%; }
        input:checked + .slider-round { background-color: #16a085; }
        input:checked + .slider-round:before { transform: translateX(22px); }
    </style>
</head>
<body>

<div class="blogger-settings-container">
    <h2>🔧 Blog Settings</h2>
    <p style="color: #718096; font-size: 10pt; margin-top: 0; margin-bottom: 20px;">Lorem Ipsum Settings Panel.</p>

    <div class="settings-section-title">Basic Controls</div>
    <div class="blogger-setting-row">
        <div class="setting-metadata">
            <span class="setting-label-text">System Maintenance Lockout Mode</span>
            <span class="setting-sub-description">Freezes the public feed stream into a 'Scheduled Maintenance' screen.</span>
        </div>
        <label class="switch-toggle-container">
            <input type="checkbox" id="maintenanceMode" onchange="handleAdminToggle('maintenanceMode', this.checked)">
            <span class="slider-round"></span>
        </label>
    </div>
</div>

<script>
function handleAdminToggle(settingKey, isChecked) {
    fetch('/api/admin/toggle-control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ settingKey, targetState: isChecked })
    })
    .then(res => res.json())
    .catch(err => console.error(err));
}
</script>
</body>
</html>
