<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioPulse Nexus - Admin Verification</title>
    <style>
        body { background-color: #f4f6f9; font-family: system-ui, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .lock-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; max-width: 360px; width: 100%; }
        .password-input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; text-align: center; }
        .verify-btn { width: 100%; background-color: #16a085; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .blogger-settings-container { display: none; background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 600px; }
    </style>
</head>
<body>
<div class="lock-container" id="lockScreen">
    <h2>🔒 Admin Gateway</h2>
    <input type="password" id="adminPassword" class="password-input" placeholder="••••••••">
    <button class="verify-btn" onclick="checkPassword()">Unlock Console</button>
</div>
<div class="blogger-settings-container" id="settingsPanel">
    <h2>🔧 Blog Settings</h2>
    <p>Admin panel successfully loaded.</p>
</div>
<script>
function checkPassword() {
    const enteredPass = document.getElementById('adminPassword').value;
    if (enteredPass === 'eric2026') {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('settingsPanel').style.display = 'block';
    } else {
        alert('Incorrect Password');
    }
}
</script>
</body>
</html>
